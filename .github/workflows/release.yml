name: Build and Release
run-name: Release ${{ inputs.version || github.ref_name }} by @${{ github.actor }}

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v1.0.1)'
        required: true
        default: 'v1.0.0'

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'
        include-prerelease: true

    - name: Publish
      run: |
        dotnet publish -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -o ./publish

    - name: Create Release (Custom Run)
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        TAG_NAME: ${{ inputs.version || github.ref_name }}
      shell: pwsh
      run: |
        Write-Host "Creating release for tag: $env:TAG_NAME"
        # Delete the release if it already exists to allow re-runs
        gh release delete $env:TAG_NAME --yes --cleanup-tag 2>$null || $true
        gh release create $env:TAG_NAME ./publish/FluidScroll.exe --title "FluidScroll $env:TAG_NAME" --generate-notes
